<!DOCTYPE HTML>
<html>
    <head>
    <meta charset="UTF-8">    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel=stylesheet href="style0.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 2. The Actual Google Font Stylesheet Link -->
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    </head>    
        <body>
            <div class="view">
                <div class="result">
                <h2 class="view__result">Your Result</h2>
                <div class="result__circle">
                    <span class="circle__score">76</span>
                    <span class="circle__of">of 100</span>
                </div>
                <h3 class="result__remark">Great</h3>
                <p class="result__comment">You scored higher than 65% of the people who have taken these tests.</p>
                </div>
                <div class="summary">
                <h2 class="view__summary">Summary</h2>
                <ul class="summary__list">
                    <li class="summary_item" summary-item--reaction>
                        <span class="icon"><img src="assets\images\icon-reaction.svg" alt="reaction logo"></span>
                        <span class="category-reaction">Reaction</span>
                        <span class="score">80<span class="summary-item__max">/100</span></span>
                    </li>
                    <li class="summary_item" summary-item--memory>
                        <span class="icon"><img src="assets\images\icon-memory.svg" alt="memory logo"></span>
                        <span class="category-memory">Memory</span>
                        <span class="score">92<span class="summary-item__max">/100</span></span>
                    </li>
                    <li class="summary_item" summary-item--verbal>
                        <span class="icon"><img src="assets\images\icon-verbal.svg" alt="verbal logo"></span>
                        <span class="category-verbal">Verbal</span>
                        <span class="score">61<span class="summary-item__max">/100</span></span>
                    </li>
                    <li class="summary_item" summary-item--visual>
                        <span class="icon"><img src="assets\images\icon-visual.svg" alt="visual logo"></span>
                        <span class="category-visual">Visual</span>
                        <span class="score">72<span class="summary-item__max">/100</span></span>
                    </li>
                </ul>   
                <button class="continue-btn">Continue</button> 
                </div>  
            </div>
        </body>
</html>
